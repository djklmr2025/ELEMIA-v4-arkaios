services:
  - type: web
    name: elemia-v4-arkaios
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm run start:http
    healthCheckPath: /elemia/ping
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: SUPERMEMORY_API_KEY
        sync: false
      - key: ELEMIA_HTTP_TOKEN
        sync: false
      - key: WHATSAPP_VERIFY_TOKEN
        sync: false
      - key: WHATSAPP_ACCESS_TOKEN
        sync: false
      - key: WHATSAPP_PHONE_NUMBER_ID
        sync: false
      - key: WHATSAPP_APP_SECRET
        sync: false
      - key: WHATSAPP_API_VERSION
        value: v23.0
      - key: BASE44_APP_ID
        sync: false
      - key: BASE44_API_KEY
        sync: false
      - key: BASE44_API_BASE
        value: https://arkaios2025.base44.app/api
      - key: BASE44_IMAGE_ENDPOINT
        value: GenerateImage
